name: Build ToonStream APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone aniyomi-extensions
        run: git clone --depth=1 https://github.com/aniyomiorg/aniyomi-extensions.git

      - name: Show injekt references in cloned repo
        run: |
          echo "=== Files containing injekt ==="
          grep -r "injekt" aniyomi-extensions/ --include="*.gradle" --include="*.kts" --include="*.toml" -l || true
          echo "=== injekt content in those files ==="
          grep -r "injekt" aniyomi-extensions/ --include="*.gradle" --include="*.kts" --include="*.toml" || true

      - name: Patch injekt in all file types
        run: |
          find aniyomi-extensions -type f \( -name "*.gradle" -o -name "*.kts" \) \
            -exec sed -i 's|com\.github\.inorichi\.injekt:injekt-core:[a-zA-Z0-9_.-]*|uy.kohesive.injekt:injekt-core:1.16.1|g' {} \;
          find aniyomi-extensions -type f -name "*.toml" \
            -exec sed -i '/^injekt/s|"[a-zA-Z0-9_.-]*"|"1.16.1"|g' {} \;
          find aniyomi-extensions -type f -name "*.toml" \
            -exec sed -i 's|com\.github\.inorichi\.injekt:injekt-core|uy.kohesive.injekt:injekt-core|g' {} \;
          echo "=== After patch ==="
          grep -r "injekt" aniyomi-extensions/ --include="*.gradle" --include="*.kts" --include="*.toml" || true

      - name: Copy ToonStream extension into repo
        run: |
          mkdir -p aniyomi-extensions/src/hi/toonstream/src/eu/kanade/tachiyomi/animeextension/hi/toonstream
          cp build.gradle aniyomi-extensions/src/hi/toonstream/
          cp AndroidManifest.xml aniyomi-extensions/src/hi/toonstream/
          cp src/eu/kanade/tachiyomi/animeextension/hi/toonstream/*.kt aniyomi-extensions/src/hi/toonstream/src/eu/kanade/tachiyomi/animeextension/hi/toonstream/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Build ToonStream APK
        working-directory: aniyomi-extensions
        env:
          CI: "false"
        run: ./gradlew :src:hi:toonstream:assembleRelease --no-daemon

      - name: Find APK
        run: find aniyomi-extensions -name "*.apk" -type f

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: toonstream-aniyomi-apk
          path: aniyomi-extensions/src/hi/toonstream/build/outputs/apk/**/*.apk
          if-no-files-found: error
